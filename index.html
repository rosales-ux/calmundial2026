.header{background:#1c1c1e;color:#fff;padding:calc(env(safe-area-inset-top,44px) + 12px) 16px 14px;position:sticky;top:0;z-index:100}

.live-dot span{width:7px;height:7px;background:#ff3b30;border-radius:50%;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.api-status{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.filters{background:#fff;border-bottom:.5px solid #d1d1d6;padding:10px 16px;position:sticky;top:var(--hh,90px);z-index:99;display:flex;flex-direction:column;gap:8px}
.search-row{display:flex;align-items:center;background:#f2f2f7;border-radius:10px;padding:7px 10px;gap:6px}
.search-row input{border:none;background:transparent;font-size:15px;width:100%;outline:none;color:#1c1c1e}
.pills-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pills-row::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid #d1d1d6;background:#fff;color:#3c3c43;cursor:pointer;transition:all .15s}
.pill.active{background:#1c1c1e;color:#fff;border-color:#1c1c1e}
.stats-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-chip{flex-shrink:0;background:#fff;border-radius:10px;padding:8px 12px;display:flex;flex-direction:column;align-items:center;min-width:72px;border:.5px solid #d1d1d6}
.stat-chip .num{font-size:20px;font-weight:700;color:#1c1c1e}
.stat-chip .lbl{font-size:10px;color:#8e8e93;text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.date-label{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.6px;padding:10px 16px 4px}
.match-card{background:#fff;margin:4px 12px;border-radius:12px;overflow:hidden;border:.5px solid #e5e5ea}
.card-top{display:flex;align-items:center;padding:10px 12px 8px;gap:10px}
.partido-num{font-size:11px;color:#8e8e93;font-weight:500;min-width:26px}
.hora{font-size:15px;font-weight:700;color:#1c1c1e;letter-spacing:-.2px;min-width:42px}
.encuentro{font-size:13px;font-weight:500;color:#1c1c1e;flex:1;line-height:1.3}
.fase-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;flex-shrink:0}
.fase-grupos{background:#e8f5e9;color:#2e7d32}
.fase-diecisei{background:#e3f2fd;color:#1565c0}
.fase-octavos{background:#fff3e0;color:#e65100}

.fase-tercer{background:#fff8e1;color:#f57f17}
.fase-final{background:#1c1c1e;color:#ffd60a}

.score-num{font-size:22px;font-weight:700;color:#1c1c1e;letter-spacing:-1px}

.score-ht{font-size:11px;color:#8e8e93}

.ft-label{font-size:10px;color:#8e8e93;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.card-bottom{display:flex;border-top:.5px solid #f2f2f7}
.tv-cell{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 6px;border-right:.5px solid #f2f2f7}
.tv-cell:last-child{border-right:none}

.empty{text-align:center;padding:60px 20px;color:#8e8e93}
.count-bar{font-size:12px;color:#8e8e93;padding:8px 16px 0}
.bottom-safe{height:calc(env(safe-area-inset-bottom,16px) + 16px)}

function tvDisplay(val){
  if(val==="SÍ") return `<span class="tv-status tv-si">✓ En vivo</span>`;
  if(val==="DIFERIDO") return `<span class="tv-status tv-dif">⏱ Diferido</span>`;
  if(val.includes("EXCLUSIVO")) return `<span class="tv-status tv-exc">★ Exclusivo</span>`;
  return `<span class="tv-status">${val}</span>`;
}
function scoreBlock(sc){
  if(!sc) return '';
  const{status,home,away,htHome,htAway,minute}=sc;
  if(status==='live'){
    return `<div class="card-score">
      <span class="score-num">${home} - ${away}</span>
      <span class="score-min">${minute}'</span>
      ${htHome!==null?`<span class="score-ht">MT: ${htHome}-${htAway}</span>`:''}
      <span class="live-badge"><span class="live-badge-dot"></span>EN VIVO</span>
    </div>`;
  }
  if(status==='ht'){
    return `<div class="card-score">
      <span class="score-num">${home} - ${away}</span>
      <span class="live-badge"><span class="live-badge-dot"></span>MEDIO TIEMPO</span>
    </div>`;
  }
  if(status==='ft'){
    return `<div class="card-score">
      <span class="ft-label">Final</span>
      <span class="score-num">${home} - ${away}</span>
      ${htHome!==null?`<span class="score-ht">MT: ${htHome}-${htAway}</span>`:''}
    </div>`;
  }
  return '';
}

// ── Render ───────────────────────────────────────────────────
function buildStats(f){
  const t=f.length,ev=f.filter(m=>m.tv==="SÍ").length,ex=f.filter(m=>m.tigo.includes("EXCLUSIVO")).length,fd=new Set(f.map(m=>m.fecha)).size;
  const lv=f.filter(m=>m.score&&(m.score.status==='live'||m.score.status==='ht')).length;
  let h=`<div class="stat-chip"><span class="num">${t}</span><span class="lbl">Partidos</span></div><div class="stat-chip"><span class="num">${ev}</span><span class="lbl">TV Abierta</span></div><div class="stat-chip"><span class="num">${ex}</span><span class="lbl">Solo Tigo</span></div><div class="stat-chip"><span class="num">${fd}</span><span class="lbl">Días</span></div>`;
  if(lv>0) h+=`<div class="stat-chip"><span class="num" style="color:#ff3b30">${lv}</span><span class="lbl">En vivo</span></div>`;
  document.getElementById("statsBar").innerHTML=h;
}

function render(){
  const filtered=matches.filter(m=>{
    const q=searchQ.toLowerCase();
    return(!q||m.encuentro.toLowerCase().includes(q))&&(activeFase==="Todos"||m.fase===activeFase)&&(activeDia==="Todos"||m.fecha===activeDia);
  });
  buildStats(filtered);
  document.getElementById("countBar").textContent=filtered.length===matches.length?`${matches.length} partidos en total`:`${filtered.length} partido${filtered.length!==1?"s":""} encontrado${filtered.length!==1?"s":""}`;
  const hasLive=filtered.some(m=>m.score&&(m.score.status==='live'||m.score.status==='ht'));
  document.getElementById("liveDot").style.display=hasLive?"flex":"none";
  const byDate={};
  filtered.forEach(m=>{if(!byDate[m.fecha])byDate[m.fecha]=[];byDate[m.fecha].push(m);});
  document.getElementById("list").innerHTML=Object.entries(byDate).map(([fecha,ms])=>{
    return `<div class="date-group"><div class="date-label">${fecha}</div>${ms.map(m=>`<div class="match-card">
      <div class="card-top"><span class="partido-num">#${m.num}</span><span class="hora">${m.hora}</span><span class="encuentro">${m.encuentro}</span>${faseBadge(m.fase)}</div>
      ${m.sim?`<div class="simultaneo-tag">${m.sim}</div>`:''}
      ${scoreBlock(m.score)}
      <div class="card-bottom"><div class="tv-cell"><span class="tv-name">TV Abierta / Fox</span>${tvDisplay(m.tv)}</div><div class="tv-cell"><span class="tv-name">Tigo Sports</span>${tvDisplay(m.tigo)}</div></div>
    </div>`).join('')}</div>`;
  }).join('');
}

function buildPills(){
  document.getElementById("fasePills").innerHTML=fases.map(f=>`<button class="pill ${f===activeFase?"active":""}" data-fase="${f}">${f==="Fase de Grupos"?"Grupos":f}</button>`).join("");
  document.getElementById("fasePills").querySelectorAll(".pill").forEach(b=>b.addEventListener("click",()=>{activeFase=b.dataset.fase;activeDia="Todos";buildPills();buildDiaPills();render();}));
}
function buildDiaPills(){
  const diasF=activeFase==="Todos"?dias:[...new Set(matches.filter(m=>m.fase===activeFase).map(m=>m.fecha))];
  const allDias=["Todos",...diasF];
  if(!allDias.includes(activeDia))activeDia="Todos";
  document.getElementById("diaPills").innerHTML=allDias.map(d=>`<button class="pill ${d===activeDia?"active":""}" data-dia="${d}">${d==="Todos"?"Todas las fechas":d}</button>`).join("");
  document.getElementById("diaPills").querySelectorAll(".pill").forEach(b=>b.addEventListener("click",()=>{activeDia=b.dataset.dia;buildDiaPills();render();}));
}
document.getElementById("searchInput").addEventListener("input",e=>{searchQ=e.target.value;document.getElementById("clearSearch").style.display=searchQ?"block":"none";render();});
document.getElementById("clearSearch").addEventListener("click",()=>{searchQ="";document.getElementById("searchInput").value="";document.getElementById("clearSearch").style.display="none";render();});
window.addEventListener("load",()=>{const h=document.getElementById("mainHeader").offsetHeight;document.getElementById("mainFilters").style.top=h+"px";});

// ── Smart API fetch ───────────────────────────────────────────
function fuzzyMatch(apiName, localName){
  const a=apiName.toLowerCase(), b=localName.toLowerCase();
  return a.includes(b)||b.includes(a)||a.split(' ').some(w=>w.length>3&&b.includes(w));
}

function setStatus(txt){
  document.getElementById("apiStatus").textContent=txt;
}

function scheduleNextFetch(hasLive){
  if(refreshTimer) clearTimeout(refreshTimer);
  if(hasLive){
    // Hay partido activo → refrescar en 5 minutos
    refreshTimer=setTimeout(fetchScores, 5*60*1000);
    setStatus("En vivo · próxima actualización en 5 min");
  } else if(hasActiveToday){
    // Hay partidos hoy pero ninguno activo ahora → refrescar en 5 min por si empieza
    refreshTimer=setTimeout(fetchScores, 5*60*1000);
    setStatus("Esperando inicio · revisa en 5 min");
  } else {
    // No hay partidos hoy → no refrescar
    setStatus("Sin partidos hoy · sin actualizaciones automáticas");
  }
}

async function fetchScores(){
  const today=todayDateStr();
  try{
    const url=`https://v3.football.api-sports.io/fixtures?league=${LEAGUE_ID}&season=${SEASON}&date=${today}`;
    const res=await fetch(url,{headers:{"x-apisports-key":API_KEY}});
    const data=await res.json();

    if(!data.response||data.response.length===0){
      hasActiveToday=false;
      scheduleNextFetch(false);
      setStatus("Sin partidos hoy");
      return;
    }

    hasActiveToday=true;
    let anyLive=false;

    // Reset scores for today's matches only
    matches.forEach(m=>{if(m.score&&(m.score.status==='live'||m.score.status==='ht')) m.score=null;});

    data.response.forEach(fix=>{
      const ss=fix.fixture.status.short;
      const home=fix.goals.home??null;
      const away=fix.goals.away??null;
      const htHome=fix.score.halftime.home??null;
      const htAway=fix.score.halftime.away??null;
      const minute=fix.fixture.status.elapsed??null;
      const hName=fix.teams.home.name;
      const aName=fix.teams.away.name;

      let status=null;
      if(['1H','2H','ET','P'].includes(ss)){status='live';anyLive=true;}
      else if(ss==='HT'){status='ht';anyLive=true;}
      else if(['FT','AET','PEN'].includes(ss)) status='ft';

      if(status===null) return;

      matches.forEach(m=>{
        const parts=m.encuentro.split(' vs. ');
        if(parts.length!==2) return;
        const[t1,t2]=parts;
        if(fuzzyMatch(hName,t1)&&fuzzyMatch(aName,t2)){
          m.score={status,home,away,htHome,htAway,minute};
        } else if(fuzzyMatch(hName,t2)&&fuzzyMatch(aName,t1)){
          m.score={status,home:away,away:home,htHome:htAway,htAway:htHome,minute};
        }
      });
    });

    render();
    const now=new Date(Date.now()-6*3600000);
    const hm=now.toISOString().slice(11,16);
    setStatus(`Actualizado ${hm}${anyLive?' · partidos en vivo':''}`);
    scheduleNextFetch(anyLive);

  }catch(e){
    console.warn("API error:",e);
    setStatus("Error al conectar con la API");
    // Reintentar en 5 min si falla
    if(hasActiveToday) refreshTimer=setTimeout(fetchScores,5*60*1000);
  }
}

// ── Init ─────────────────────────────────────────────────────
buildPills();buildDiaPills();render();
fetchScores();
